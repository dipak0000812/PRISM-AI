name: PRISM Automated MR Analysis Flow
description: |
  Triggered when a merge request is opened.
  Runs PRISM risk analysis and posts results as MR comment.
  Uses Anthropic Claude (via GitLab Duo) for AI summaries.

trigger:
  - event: merge_request
    actions:
      - open
      - reopen

steps:
  - name: fetch_analysis
    description: Retrieve PRISM risk analysis for this MR
    agent: prism-risk-agent
    inputs:
      project_id: "{{ event.project.id }}"
      mr_iid: "{{ event.merge_request.iid }}"
      mr_title: "{{ event.merge_request.title }}"

  - name: post_summary
    description: Post AI-enhanced risk summary to MR
    action: create_note
    inputs:
      project_id: "{{ event.project.id }}"
      mr_iid: "{{ event.merge_request.iid }}"
      note: "{{ steps.fetch_analysis.output }}"
