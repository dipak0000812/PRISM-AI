version: '3.9'

services:
  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prism"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PRISM Backend (FastAPI) ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://prism:prism@postgres:5432/prism
    volumes:
      - repo-cache:/tmp/prism/repos
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend (Next.js) — uncomment when frontend Dockerfile is ready ──
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NEXT_PUBLIC_API_URL=http://localhost:8000

volumes:
  pg-data:
  repo-cache:
